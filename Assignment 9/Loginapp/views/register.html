<div class="form-container">
    <h2>Register</h2>
    <form name="registerForm" novalidate ng-submit="message='Registered successfully!'">
        <input type="text" ng-model="user.firstName" placeholder="First Name" required>
        <span ng-show="registerForm.$submitted && !user.firstName">*Required</span><br>

        <input type="text" ng-model="user.lastName" placeholder="Last Name" required>
        <span ng-show="registerForm.$submitted && !user.lastName">*Required</span><br>

        <input type="text" ng-model="user.username" placeholder="Username" required>
        <span ng-show="registerForm.$submitted && !user.username">*Required</span><br>

        <input type="password" ng-model="user.password" placeholder="Password" required>
        <span ng-show="registerForm.$submitted && !user.password">*Required</span><br>

        <button type="submit">Register</button>
    </form>

    <p style="color:green;" ng-if="message">{{message}}</p>

    <a href="#!/login">Already have an account? Login</a>
</div>
